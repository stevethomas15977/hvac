name: Deploy HVAC Frontend to Amazon S3

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - production
          - development

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ github.event.inputs.environment == 'production' && secrets.PROD_AWS_ACCESS_KEY_ID || secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ github.event.inputs.environment == 'production' && secrets.PROD_AWS_SECRET_ACCESS_KEY || secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/hvac/package-lock.json

      - name: Install dependencies
        working-directory: frontend/hvac
        run: npm ci

      - name: Build runtime app config
        working-directory: frontend/hvac
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            frontend_base_url="${{ vars.PROD_FRONTEND_BASE_URL }}"
            cognito_user_pool_id="${{ vars.PROD_COGNITO_USER_POOL_ID }}"
            cognito_user_pool_client_id="${{ vars.PROD_COGNITO_USER_POOL_CLIENT_ID }}"
            cognito_domain="${{ vars.PROD_COGNITO_DOMAIN }}"
          else
            frontend_base_url="${{ vars.DEV_FRONTEND_BASE_URL }}"
            cognito_user_pool_id="${{ vars.DEV_COGNITO_USER_POOL_ID }}"
            cognito_user_pool_client_id="${{ vars.DEV_COGNITO_USER_POOL_CLIENT_ID }}"
            cognito_domain="${{ vars.DEV_COGNITO_DOMAIN }}"
          fi

          frontend_base_url="${frontend_base_url%/}"

          cat > public/app-config.json <<EOF
          {
            "cognito": {
              "userPoolId": "${cognito_user_pool_id}",
              "userPoolClientId": "${cognito_user_pool_client_id}",
              "domain": "${cognito_domain}",
              "frontendBaseUrl": "${frontend_base_url}",
              "localOrigins": [
                "http://localhost:4200",
                "http://localhost:8080"
              ]
            }
          }
          EOF

      - name: Build
        working-directory: frontend/hvac
        run: npm run build -- --configuration "${{ github.event.inputs.environment }}"
   
      - name: Copy files to S3
        working-directory: frontend/hvac
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            aws s3 sync dist/hvac/browser s3://${{ vars.PROD_S3_BUCKET_FRONTEND }} --delete
          else
            aws s3 sync dist/hvac/browser s3://${{ vars.DEV_S3_BUCKET_FRONTEND }} --delete
          fi

      - name: Invalidate CloudFront cache
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            distribution_id="${{ vars.PROD_CLOUDFRONT_DISTRIBUTION_ID }}"
          else
            distribution_id="${{ vars.DEV_CLOUDFRONT_DISTRIBUTION_ID }}"
          fi

          if [ -z "$distribution_id" ]; then
            echo "CloudFront distribution ID is not configured for this environment. Skipping invalidation."
            exit 0
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$distribution_id" \
            --paths "/*"