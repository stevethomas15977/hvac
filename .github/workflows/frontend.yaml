name: Deploy HVAC Frontend to Amazon S3

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - production
          - development

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ github.event.inputs.environment == 'production' && secrets.PROD_AWS_ACCESS_KEY_ID || secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ github.event.inputs.environment == 'production' && secrets.PROD_AWS_SECRET_ACCESS_KEY || secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/hvac/package-lock.json

      - name: Install dependencies
        working-directory: frontend/hvac
        run: npm ci

      - name: Build runtime app config
        working-directory: frontend/hvac
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            frontend_base_url="${{ vars.PROD_FRONTEND_BASE_URL }}"
            cognito_user_pool_id="${{ vars.PROD_COGNITO_USER_POOL_ID }}"
            cognito_user_pool_client_id="${{ vars.PROD_COGNITO_USER_POOL_CLIENT_ID }}"
            cognito_domain="${{ vars.PROD_COGNITO_DOMAIN }}"
          else
            frontend_base_url="${{ vars.DEV_FRONTEND_BASE_URL }}"
            cognito_user_pool_id="${{ vars.DEV_COGNITO_USER_POOL_ID }}"
            cognito_user_pool_client_id="${{ vars.DEV_COGNITO_USER_POOL_CLIENT_ID }}"
            cognito_domain="${{ vars.DEV_COGNITO_DOMAIN }}"
          fi

          frontend_base_url="${frontend_base_url%/}"

          cat > public/app-config.json <<EOF
          {
            "app": {
              "proposalApiMode": "mock",
              "authMode": "cognito"
            },
            "cognito": {
              "userPoolId": "${cognito_user_pool_id}",
              "userPoolClientId": "${cognito_user_pool_client_id}",
              "domain": "${cognito_domain}",
              "frontendBaseUrl": "${frontend_base_url}",
              "localOrigins": [
                "http://localhost:4200",
                "http://localhost:8080"
              ]
            }
          }
          EOF

      - name: Build
        working-directory: frontend/hvac
        run: npm run build -- --configuration "${{ github.event.inputs.environment }}"

      - name: Resolve deployment context
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            s3_bucket="${{ vars.PROD_S3_BUCKET_FRONTEND }}"
            distribution_id="${{ vars.PROD_CLOUDFRONT_DISTRIBUTION_ID }}"
            deployed_url="${{ vars.PROD_FRONTEND_BASE_URL }}"
          else
            s3_bucket="${{ vars.DEV_S3_BUCKET_FRONTEND }}"
            distribution_id="${{ vars.DEV_CLOUDFRONT_DISTRIBUTION_ID }}"
            deployed_url="${{ vars.DEV_FRONTEND_BASE_URL }}"
          fi

          deployed_url="${deployed_url%/}"

          echo "S3_BUCKET_FRONTEND=${s3_bucket}" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_DISTRIBUTION_ID=${distribution_id}" >> "$GITHUB_ENV"
          echo "DEPLOYED_URL=${deployed_url}" >> "$GITHUB_ENV"
   
      - name: Copy files to S3
        working-directory: frontend/hvac
        run: aws s3 sync dist/hvac/browser s3://${S3_BUCKET_FRONTEND} --delete

      - name: Invalidate CloudFront cache
        run: |
          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "CloudFront distribution ID is not configured for this environment. Skipping invalidation."
            echo "CLOUDFRONT_INVALIDATION_ID=not-configured" >> "$GITHUB_ENV"
            exit 0
          fi

          invalidation_id=$(aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "CLOUDFRONT_INVALIDATION_ID=${invalidation_id}" >> "$GITHUB_ENV"

      - name: Post-deploy smoke checks
        run: |
          if [ -z "$DEPLOYED_URL" ]; then
            echo "DEPLOYED_URL is not configured. Skipping smoke checks."
            echo "SMOKE_CHECK_STATUS=skipped" >> "$GITHUB_ENV"
            exit 0
          fi

          root_status=$(curl -sS -o /tmp/root.html -w "%{http_code}" "$DEPLOYED_URL/")
          if [ "$root_status" != "200" ]; then
            echo "Root URL health check failed with status: $root_status"
            exit 1
          fi

          if ! grep -q "<app-root" /tmp/root.html; then
            echo "Smoke check failed: app shell marker '<app-root' not found at root URL."
            exit 1
          fi

          echo "SMOKE_CHECK_STATUS=passed" >> "$GITHUB_ENV"

      - name: Deployment summary
        run: |
          {
            echo "## Frontend Deploy Summary"
            echo "- Environment: ${{ github.event.inputs.environment }}"
            echo "- Deployed URL: ${DEPLOYED_URL:-not-configured}"
            echo "- CloudFront Distribution ID: ${CLOUDFRONT_DISTRIBUTION_ID:-not-configured}"
            echo "- CloudFront Invalidation ID: ${CLOUDFRONT_INVALIDATION_ID:-not-created}"
            echo "- Smoke Check: ${SMOKE_CHECK_STATUS:-not-run}"
          } >> "$GITHUB_STEP_SUMMARY"