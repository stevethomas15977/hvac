name: Manage AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - production
          - development
      command:
        description: 'Select the command to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
          
env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ github.event.inputs.environment == 'production' && secrets.PROD_AWS_ACCESS_KEY_ID || secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ github.event.inputs.environment == 'production' && secrets.PROD_AWS_SECRET_ACCESS_KEY || secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=environments/${{ github.event.inputs.environment }}/backend.hcl

      - name: Prepare Cognito redirect URLs
        run: |
          callback_urls='[]'
          logout_urls='[]'
          api_allowed_origins='[]'
          frontend_bucket_name=''

          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            base_url="${{ vars.PROD_FRONTEND_BASE_URL }}"
            frontend_bucket_name="${{ vars.PROD_S3_BUCKET_FRONTEND }}"
          else
            base_url="${{ vars.DEV_FRONTEND_BASE_URL }}"
            frontend_bucket_name="${{ vars.DEV_S3_BUCKET_FRONTEND }}"
            if [[ -z "$base_url" ]]; then
              base_url="https://hvac-dev.softwarelikeyou.com"
            fi
          fi

          base_url="${base_url%/}"

          if [[ -z "$base_url" ]]; then
            echo "No frontend base URL configured. Using localhost-only Cognito redirects from Terraform defaults."
          elif [[ "$base_url" =~ ^https:// ]]; then
            callback_urls="[\"${base_url}/callback\"]"
            logout_urls="[\"${base_url}/logout\"]"
            api_allowed_origins="[\"${base_url}\"]"
          else
            echo "Skipping deployed redirect URL because Cognito Hosted UI requires HTTPS for non-localhost URLs: $base_url"
          fi

          echo "COGNITO_ADDITIONAL_CALLBACK_URLS=${callback_urls}" >> "$GITHUB_ENV"
          echo "COGNITO_ADDITIONAL_LOGOUT_URLS=${logout_urls}" >> "$GITHUB_ENV"
          echo "PROPOSAL_API_ALLOWED_ORIGINS=${api_allowed_origins}" >> "$GITHUB_ENV"
          echo "FRONTEND_BUCKET_NAME=${frontend_bucket_name}" >> "$GITHUB_ENV"

      - name: Terraform command
        working-directory: terraform
        run: |
          tf_var_file="environments/${{ github.event.inputs.environment }}/hvac.tfvars"

          if [ "${{ github.event.inputs.command }}" == "plan" ]; then
            terraform plan \
              -var-file="${tf_var_file}" \
              -var "deployment_environment=${{ github.event.inputs.environment }}" \
              -var "frontend_bucket_name=${FRONTEND_BUCKET_NAME}" \
              -var "cognito_additional_callback_urls=${COGNITO_ADDITIONAL_CALLBACK_URLS}" \
              -var "cognito_additional_logout_urls=${COGNITO_ADDITIONAL_LOGOUT_URLS}" \
              -var "proposal_api_allowed_origins=${PROPOSAL_API_ALLOWED_ORIGINS}"
          fi
          if [ "${{ github.event.inputs.command }}" == "apply" ]; then
            terraform apply -auto-approve \
              -var-file="${tf_var_file}" \
              -var "deployment_environment=${{ github.event.inputs.environment }}" \
              -var "frontend_bucket_name=${FRONTEND_BUCKET_NAME}" \
              -var "cognito_additional_callback_urls=${COGNITO_ADDITIONAL_CALLBACK_URLS}" \
              -var "cognito_additional_logout_urls=${COGNITO_ADDITIONAL_LOGOUT_URLS}" \
              -var "proposal_api_allowed_origins=${PROPOSAL_API_ALLOWED_ORIGINS}"
          fi
          if [ "${{ github.event.inputs.command }}" == "destroy" ]; then
            terraform destroy -auto-approve \
              -var-file="${tf_var_file}" \
              -var "deployment_environment=${{ github.event.inputs.environment }}" \
              -var "frontend_bucket_name=${FRONTEND_BUCKET_NAME}" \
              -var "cognito_additional_callback_urls=${COGNITO_ADDITIONAL_CALLBACK_URLS}" \
              -var "cognito_additional_logout_urls=${COGNITO_ADDITIONAL_LOGOUT_URLS}" \
              -var "proposal_api_allowed_origins=${PROPOSAL_API_ALLOWED_ORIGINS}"
          fi